<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Folia BG — 3D Floating Notes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#fefefe;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const CV=document.getElementById('c');
const G=CV.getContext('2d');
let W,H,cx,cy;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;cx=W/2;cy=H/2;}
resize();addEventListener('resize',resize);

const PI=Math.PI,TAU=PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

let F=0;

/* ══════════════════════════════════════
   3D 风格绘制函数
   ══════════════════════════════════════ */

// 生成具有 3D 质感的渐变（塑料光泽/气球质感）
function get3DGradient(x, y, r, baseColor, alpha) {
  // baseColor 类似 '30,25,20'
  const grad = G.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r*1.2);
  grad.addColorStop(0, `rgba(255,255,255,${alpha})`); // 高光
  grad.addColorStop(0.2, `rgba(120,110,100,${alpha})`); // 过渡
  grad.addColorStop(0.6, `rgba(${baseColor},${alpha})`); // 本色
  grad.addColorStop(1, `rgba(0,0,0,${alpha})`); // 暗部边缘
  return grad;
}

// 3D 椭圆音符头
function noteHead3D(sz, alpha, hollow=false){
  G.save(); G.rotate(-.36);
  G.beginPath(); G.ellipse(0,0,sz*.57,sz*.42,0,0,TAU);
  if(!hollow){
    G.fillStyle = get3DGradient(0, 0, sz*.6, '30,25,20', alpha);
    G.fill();
  } else {
    // 二分音符空心圈（环形 3D 感）
    G.lineWidth = sz*.18;
    // 使用径向渐变作为笔触，模拟圆环的体积感
    const r = sz * 0.6;
    const grad = G.createLinearGradient(-r, -r, r, r);
    grad.addColorStop(0, `rgba(200,200,200,${alpha})`);
    grad.addColorStop(0.5, `rgba(30,25,20,${alpha})`);
    grad.addColorStop(1, `rgba(0,0,0,${alpha})`);
    G.strokeStyle = grad;
    G.stroke();
  }
  G.restore();
}

// 3D 柱状茎
function stem3D(sz, up, alpha){
  const sx=sz*.44, sy=up?-sz*.08:sz*.08, ey=up?-sz*2.85:sz*2.85;
  G.beginPath(); G.moveTo(sx,sy); G.lineTo(sx,ey);
  
  // 线性渐变模拟圆柱体
  const grad = G.createLinearGradient(sx - sz*.08, 0, sx + sz*.08, 0);
  grad.addColorStop(0, `rgba(0,0,0,${alpha})`);
  grad.addColorStop(0.3, `rgba(100,90,80,${alpha})`);
  grad.addColorStop(0.5, `rgba(255,255,255,${alpha})`);
  grad.addColorStop(0.7, `rgba(30,25,20,${alpha})`);
  grad.addColorStop(1, `rgba(0,0,0,${alpha})`);

  G.strokeStyle = grad; 
  G.lineWidth=sz*.16; G.lineCap='round'; G.stroke();
}

// 3D 小旗（八分音符）
function flag3D(sz, up, alpha){
  const sx=sz*.44, top=up?-sz*2.85:sz*2.85, d=up?1:-1;
  G.beginPath(); G.moveTo(sx,top);
  G.bezierCurveTo(sx+sz*1.25, top+sz*d*.52, sx+sz*1.1, top+sz*d*1.28, sx+sz*.12, top+sz*d*1.7);
  
  const grad = G.createLinearGradient(sx, top, sx+sz*1.25, top+sz*d*1.7);
  grad.addColorStop(0, `rgba(80,70,60,${alpha})`);
  grad.addColorStop(0.5, `rgba(30,25,20,${alpha})`);
  grad.addColorStop(1, `rgba(0,0,0,${alpha})`);

  G.strokeStyle=grad; G.lineWidth=sz*.15; G.lineCap='round'; G.stroke();
}

// 3D 横梁（连音）
function beam3D(sz, gap, alpha){
  const sx=sz*.44, ex=gap+sz*.44, ty=-sz*3.08;
  G.beginPath(); G.moveTo(sx,ty); G.lineTo(ex,ty);
  
  const grad = G.createLinearGradient(0, ty - sz*.2, 0, ty + sz*.2);
  grad.addColorStop(0, `rgba(100,90,80,${alpha})`);
  grad.addColorStop(0.3, `rgba(255,255,255,${alpha})`);
  grad.addColorStop(0.6, `rgba(30,25,20,${alpha})`);
  grad.addColorStop(1, `rgba(0,0,0,${alpha})`);

  G.strokeStyle=grad; G.lineWidth=sz*.4; G.lineCap='round'; G.stroke();
}

// 组合音符
function drawQuarter3D(sz, up, alpha){
  noteHead3D(sz, alpha, false); stem3D(sz, up, alpha);
}
function drawHalf3D(sz, up, alpha){
  noteHead3D(sz, alpha, true); stem3D(sz, up, alpha);
}
function drawEighth3D(sz, up, alpha){
  noteHead3D(sz, alpha, false); stem3D(sz, up, alpha); flag3D(sz, up, alpha);
}
function drawBeamed3D(sz, alpha){
  const gap=sz*2.3;
  noteHead3D(sz, alpha, false);
  G.save(); G.translate(gap,0); noteHead3D(sz, alpha, false); G.restore();
  stem3D(sz, true, alpha);
  G.save(); G.translate(gap,0); stem3D(sz, true, alpha); G.restore();
  beam3D(sz, gap, alpha);
}

// 3D 爱心
function drawHeart3D(sz, alpha){
  G.save(); G.scale(sz/16, sz/16);
  G.beginPath();
  G.moveTo(0,5);
  G.bezierCurveTo(-8,-2,-16,6,-16,12);
  G.bezierCurveTo(-16,21,0,29,0,29);
  G.bezierCurveTo(0,29,16,21,16,12);
  G.bezierCurveTo(16,6,8,-2,0,5);
  G.closePath();
  
  // 立体红色材质
  const grad = G.createRadialGradient(-4, 4, 1, 0, 10, 20);
  grad.addColorStop(0, `rgba(255,150,150,${alpha})`);
  grad.addColorStop(0.2, `rgba(220,50,50,${alpha})`);
  grad.addColorStop(0.7, `rgba(120,10,10,${alpha})`);
  grad.addColorStop(1, `rgba(40,0,0,${alpha})`);

  G.fillStyle=grad; G.fill();
  G.restore();
}

// 3D 星星（圆润膨胀感）
function drawStar3D(sz, alpha){
  G.save();
  const r1=sz, r2=sz*.45;
  G.beginPath();
  for(let i=0;i<8;i++){
    const a=i/8*TAU-PI/2, r=i%2===0?r1:r2;
    // 使用二次贝塞尔曲线让星星看起来更圆润，像充气气球
    const nextA = ((i+1)%8)/8*TAU-PI/2;
    const nextR = (i+1)%2===0?r1:r2;
    const cpX = Math.cos((a+nextA)/2) * ((r+nextR)/2 * 0.8);
    const cpY = Math.sin((a+nextA)/2) * ((r+nextR)/2 * 0.8);
    
    if(i===0) G.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    G.quadraticCurveTo(cpX, cpY, Math.cos(nextA)*nextR, Math.sin(nextA)*nextR);
  }
  G.closePath();
  
  // 立体金色材质
  const grad = G.createRadialGradient(-sz*.2, -sz*.2, sz*.05, 0, 0, sz);
  grad.addColorStop(0, `rgba(255,255,200,${alpha})`);
  grad.addColorStop(0.3, `rgba(255,200,50,${alpha})`);
  grad.addColorStop(0.8, `rgba(150,100,10,${alpha})`);
  grad.addColorStop(1, `rgba(50,30,0,${alpha})`);

  G.fillStyle=grad; G.fill();
  G.restore();
}

/* ══════════════════════════════════════
   浮动元素 Particle
   ══════════════════════════════════════ */
const POOL=['quarter','eighth','half','beamed','heart','star'];

class Elem{
  constructor(init=false){this.reset(init);}
  reset(init=false){
    this.type = POOL[Math.floor(rand(0, POOL.length))];
    
    // 尺寸差异化
    if(this.type === 'heart' || this.type === 'star') {
        this.sz = rand(10, 35); // 大小分布更广
    } else {
        this.sz = rand(12, 28);
    }

    this.x = rand(this.sz * 2, W - this.sz * 2);
    this.y = init ? rand(H*.1, H*.9) : H + rand(20, 80);

    // 透明度层次
    this.tAlpha = rand(0.3, 0.95);

    this.up = Math.random() > .5;
    this.vy = rand(-1.2, -2.5); // 上浮速度
    this.vx = rand(-1.5, 1.5);  // 水平速度，用于回弹
    
    // 旋转
    this.rot = rand(-PI*.2, PI*.2);
    this.rotV = rand(-.02, .02);
    
    // 飘动 (左右微微摇摆)
    this.swayF = rand(.5, 1.5);
    this.swayP = rand(0, TAU);

    this.alpha = 0;
    this.born = F;
    this.life = rand(500, 1000);
    this.fadeT = rand(30, 60);
  }
  
  live(){
    const age = F - this.born;
    const lifeRatio = age / this.life;
    
    if(age < this.fadeT) this.alpha = lerp(0, this.tAlpha, age/this.fadeT);
    else if(lifeRatio > .8) this.alpha = lerp(this.tAlpha, 0, (lifeRatio-.8)/.2);
    else this.alpha = this.tAlpha;

    // 运动学：结合基础 vx 和正弦摇摆
    let currentVx = this.vx + Math.sin(F*.01 * this.swayF + this.swayP) * 0.5;
    this.x += currentVx;
    this.y += this.vy;
    this.rot += this.rotV;

    // 边缘回弹逻辑
    const margin = this.sz * 1.5;
    if (this.x < margin) {
        this.x = margin;
        this.vx = Math.abs(this.vx); // 向右弹
    } else if (this.x > W - margin) {
        this.x = W - margin;
        this.vx = -Math.abs(this.vx); // 向左弹
    }

    return age < this.life && this.y > -100 && this.alpha > 0.001;
  }
  
  draw(){
    G.save();
    G.translate(this.x, this.y);
    G.rotate(this.rot);
    
    const t = this.type, sz = this.sz, a = this.alpha;
    
    // 绘制阴影增强 3D 浮动感
    G.shadowColor = `rgba(0,0,0,${a * 0.3})`;
    G.shadowBlur = sz * 0.8;
    G.shadowOffsetX = sz * 0.3;
    G.shadowOffsetY = sz * 0.5;

    if(t==='quarter') drawQuarter3D(sz, this.up, a);
    else if(t==='eighth') drawEighth3D(sz, this.up, a);
    else if(t==='half')   drawHalf3D(sz, this.up, a);
    else if(t==='beamed') drawBeamed3D(sz, a);
    else if(t==='heart')  drawHeart3D(sz, a);
    else if(t==='star')   drawStar3D(sz, a);
    
    G.restore();
  }
}

const elems=[];
for(let i=0;i<45;i++) elems.push(new Elem(true));

/* ══════════════════════════════════════
   流水五线谱（居中，缓慢摆动）
   ══════════════════════════════════════ */
const STAFF_SP=12;        // 谱线间距
const STAFF_ALPHA=0.15;   // 透明度

function drawFlowingStaff(){
  const t=F*.01;
  const cy0 = cy + Math.sin(t*.3)*15; // 整体中心缓慢上下漂浮

  G.save();
  G.strokeStyle=`rgba(30,25,20,${STAFF_ALPHA})`;
  G.lineWidth=1.5; G.lineCap='round';

  for(let i=0;i<5;i++){
    const baseY=cy0+(i-2)*STAFF_SP;
    const ph=i*.4; // 错开相位
    
    G.beginPath();
    const step=10;
    const steps=Math.ceil(W/step);
    for(let s=0;s<=steps;s++){
      const x=s*step;
      const wy=
        Math.sin(x*.005 + t*1.2 + ph) * 8 +
        Math.sin(x*.015 - t*0.8 + ph) * 4;
      s===0 ? G.moveTo(x, baseY+wy) : G.lineTo(x, baseY+wy);
    }
    G.stroke();
  }
  G.restore();
}

/* ══════════════════════════════════════
   主循环
   ══════════════════════════════════════ */
G.fillStyle='#fefefe';G.fillRect(0,0,W,H);

function loop(){
  requestAnimationFrame(loop); F++;
  
  // 拖影清理背景
  G.fillStyle='rgba(254,254,254,0.4)';
  G.fillRect(0,0,W,H);

  drawFlowingStaff();

  // 维持元素数量
  if(elems.length < 50 && Math.random() < 0.05) {
      elems.push(new Elem(false));
  }

  // 浮动元素更新和绘制
  for(let i=elems.length-1; i>=0; i--){
    if(!elems[i].live()){
        elems.splice(i,1);
    } else {
        elems[i].draw();
    }
  }
}
loop();
</script>
</body>
</html>
