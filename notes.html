<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Folia BG — Musical Garden</title>
<style>
*{margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#fefefe;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const CV=document.getElementById('c');
const G=CV.getContext('2d');
let W,H,cx,cy;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;cx=W/2;cy=H/2;}
resize();addEventListener('resize',resize);

const PI=Math.PI,TAU=PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

/* ── 节拍 78BPM ── */
let F=0;
const BPM=78,BF=60*60/BPM;
function bEnv(){return Math.pow(clamp(1-(F%BF)/BF*2.3,0,1),2.8);}

/* ════════════════════════════════════════
   绘制原语（均在 (0,0) 绘制）
   ════════════════════════════════════════ */
function noteHead(sz,fill,hl=false){
  G.save();G.rotate(-.36);
  G.beginPath();G.ellipse(0,0,sz*.57,sz*.42,0,0,TAU);
  if(fill){
    G.fillStyle='rgb(18,15,10)';G.fill();
    if(hl){
      G.beginPath();G.ellipse(-sz*.14,-sz*.12,sz*.19,sz*.11,.3,0,TAU);
      G.fillStyle='rgba(255,255,255,.52)';G.fill();
    }
  } else {
    G.fillStyle='rgba(255,255,255,.92)';G.fill();
    G.strokeStyle='rgb(18,15,10)';G.lineWidth=sz*.13;G.stroke();
  }
  G.restore();
}
function stem(sz,up=true){
  const sx=sz*.44,sy=up?-sz*.08:sz*.08,ey=up?-sz*2.85:sz*2.85;
  G.beginPath();G.moveTo(sx,sy);G.lineTo(sx,ey);
  G.strokeStyle='rgb(18,15,10)';G.lineWidth=sz*.16;G.lineCap='round';G.stroke();
}
function flag(sz,up=true){
  const sx=sz*.44,top=up?-sz*2.85:sz*2.85,d=up?1:-1;
  G.beginPath();G.moveTo(sx,top);
  G.bezierCurveTo(sx+sz*1.25,top+sz*d*.52,sx+sz*1.1,top+sz*d*1.28,sx+sz*.12,top+sz*d*1.7);
  G.strokeStyle='rgb(18,15,10)';G.lineWidth=sz*.15;G.lineCap='round';G.stroke();
}
function beam(sz,gap){
  const sx=sz*.44,ex=gap+sz*.44,ty=-sz*3.08;
  G.beginPath();G.moveTo(sx,ty);G.lineTo(ex,ty);
  G.strokeStyle='rgb(18,15,10)';G.lineWidth=sz*.4;G.lineCap='square';G.stroke();
}
function drawQuarter(sz,up,hl){noteHead(sz,true,hl);stem(sz,up);}
function drawHalf(sz,up,hl){noteHead(sz,false,hl);stem(sz,up);}
function drawEighth(sz,up,hl){noteHead(sz,true,hl);stem(sz,up);flag(sz,up);}
function drawBeamed(sz,hl){
  const gap=sz*2.3;
  noteHead(sz,true,hl);
  G.save();G.translate(gap,0);noteHead(sz,true,false);G.restore();
  [0,gap].forEach(dx=>{
    G.beginPath();G.moveTo(dx+sz*.44,-sz*.08);G.lineTo(dx+sz*.44,-sz*3.08);
    G.strokeStyle='rgb(18,15,10)';G.lineWidth=sz*.16;G.lineCap='round';G.stroke();
  });
  beam(sz,gap);
}
function drawHeart(sz){
  G.save();G.scale(sz/16,sz/16);
  G.beginPath();
  G.moveTo(0,5);
  G.bezierCurveTo(-8,-2,-16,6,-16,12);
  G.bezierCurveTo(-16,21,0,29,0,29);
  G.bezierCurveTo(0,29,16,21,16,12);
  G.bezierCurveTo(16,6,8,-2,0,5);
  G.closePath();
  G.fillStyle='rgb(18,15,10)';G.fill();
  if(sz>14){
    G.beginPath();G.ellipse(-5,-3,4,2.5,-.4,0,TAU);
    G.fillStyle='rgba(255,255,255,.38)';G.fill();
  }
  G.restore();
}
function drawStar(sz){
  const r1=sz,r2=sz*.38;
  G.beginPath();
  for(let i=0;i<8;i++){
    const a=i/8*TAU-PI/2,r=i%2===0?r1:r2;
    i===0?G.moveTo(Math.cos(a)*r,Math.sin(a)*r):G.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  G.closePath();G.fillStyle='rgb(18,15,10)';G.fill();
  G.beginPath();G.arc(-sz*.12,-sz*.14,sz*.14,0,TAU);
  G.fillStyle='rgba(255,255,255,.4)';G.fill();
}

/* ════════════════════════════════════════
   浮动元素
   ════════════════════════════════════════ */
const POOL=[
  {t:'quarter',w:7},{t:'eighth',w:7},{t:'half',w:4},{t:'beamed',w:6},
  {t:'heart_sm',w:4},{t:'heart_md',w:4},{t:'heart_lg',w:2},
  {t:'star_sm',w:3},{t:'star_md',w:3},
];
const PTOTAL=POOL.reduce((s,p)=>s+p.w,0);
function pickType(){let r=rand(0,PTOTAL);for(const p of POOL){if(r<p.w)return p.t;r-=p.w;}return'quarter';}

/* 生成X时分三区（左/中/右），保证全屏分布 */
let zoneCounter=0;
function spawnX(){
  const z=zoneCounter%3;zoneCounter++;
  const seg=W/3;
  return seg*z+rand(seg*.08,seg*.92);
}

class Elem{
  constructor(init=false){this.reset(init);}
  reset(init=false){
    const t=this.type=pickType();
    this.x=spawnX();
    if(init){
      // 初始化：均匀分布在全屏
      this.y=rand(H*.05,H*.92);
    } else {
      // 正常生成：70%从底部浮起，30%从中下区域插入
      this.y=Math.random()<.7?H+rand(20,80):rand(H*.45,H*.88);
    }
    this.sz=t==='quarter'||t==='eighth'||t==='half'?rand(11,24):
             t==='beamed'?rand(9,16):
             t==='heart_sm'?rand(5,11):
             t==='heart_md'?rand(13,22):
             t==='heart_lg'?rand(24,40):
             t==='star_sm'?rand(4,9):rand(10,19);
    // 透明度范围大，形成层次感（浅的如远景，深的如近景）
    this.tAlpha=t.startsWith('heart')||t.startsWith('star')?rand(0.16,0.68):rand(0.18,0.82);
    this.hl=Math.random()<.48;
    this.up=Math.random()>.45;
    this.vy=rand(-.42,-1.05);
    this.vx=rand(-.3,.3);
    this.rot=rand(-PI*.28,PI*.28);
    this.rotV=rand(-.008,.008);
    this.swayA=rand(5,22);
    this.swayF=rand(.5,1.7);
    this.swayP=rand(0,TAU);
    this.alpha=0;
    this.born=F;
    this.life=rand(440,850);
    this.fadeT=rand(55,100);
    this.starRot=rand(0,TAU);
    this.bouncing=false; // 弹回状态标记
  }

  live(){
    const age=F-this.born,life=age/this.life;
    const b=bEnv();

    /* ── 透明度：时间渐隐 + 顶部边缘渐隐 ── */
    let timeFade;
    if(age<this.fadeT)       timeFade=age/this.fadeT;
    else if(life>0.68)       timeFade=clamp(1-(life-0.68)/0.32,0,1);
    else                     timeFade=1;
    // 顶部5%区域渐隐
    const topFade=clamp(this.y/(H*.07),0,1);
    this.alpha=this.tAlpha*timeFade*topFade;

    /* ── 左右边缘弹回（弹性 + 可爱抖动）── */
    const pad=Math.max(this.sz*1.5, 18);
    if(this.x<pad){
      // 弹回：速度取正，加弹力，旋转翻转
      this.vx=Math.abs(this.vx)*.72+rand(.08,.18);
      this.x=pad;
      this.rotV*=-1;           // 反转自转方向
      this.swayP+=PI;          // 摆动相位翻转
    } else if(this.x>W-pad){
      this.vx=-(Math.abs(this.vx)*.72+rand(.08,.18));
      this.x=W-pad;
      this.rotV*=-1;
      this.swayP+=PI;
    }

    /* ── 位置更新 ── */
    this.x+=this.vx+Math.sin(F*.016*this.swayF+this.swayP)*.28;
    this.y+=this.vy*(1+b*.18);
    this.rot+=this.rotV;
    this.starRot+=.009;

    /* ── 移除条件：alpha 近于零且超出生命期 ── */
    return !(this.alpha<0.008 && life>0.68);
  }

  draw(){
    if(this.alpha<0.005)return;
    const b=bEnv(),sc=1+b*.09;
    G.save();
    G.globalAlpha=this.alpha;
    G.translate(this.x,this.y);
    G.rotate(this.rot);
    G.scale(sc,sc);
    const t=this.type,sz=this.sz;
    if(t==='quarter')      drawQuarter(sz,this.up,this.hl);
    else if(t==='eighth')  drawEighth(sz,this.up,this.hl);
    else if(t==='half')    drawHalf(sz,this.up,this.hl);
    else if(t==='beamed')  drawBeamed(sz,this.hl);
    else if(t.startsWith('heart')) drawHeart(sz);
    else{G.rotate(this.starRot);drawStar(sz);}
    G.restore();
  }
}

// 初始数量减少（30个，分布全屏）
const elems=[];
for(let i=0;i<30;i++) elems.push(new Elem(true));

/* ════════════════════════════════════════
   流水五线谱（一横带，更大更清晰）
   ════════════════════════════════════════ */
const STAFF_SP   = 17;    // 谱线间距（之前8.5，现在翻倍）
const STAFF_BASE = ()=>H*.54; // 中心位置
const STAFF_A    = 0.16;  // 透明度（之前0.042，现在4倍）

function drawFlowingStaff(){
  const t=F*.007;
  // 整体上下漂浮（缓慢呼吸感）
  const bob=Math.sin(t*.35)*7+Math.sin(t*.14)*4;
  const cy0=STAFF_BASE()+bob;

  G.save();
  G.lineCap='round';

  for(let i=0;i<5;i++){
    const baseY=cy0+(i-2)*STAFF_SP;
    const ph=i*.6; // 每条线相位错开

    // 每条谱线透明度略有差异，更自然
    const la=STAFF_A*(0.82+i*.045);
    G.strokeStyle=`rgba(18,15,10,${la})`;
    G.lineWidth=1.3;

    G.beginPath();
    const step=3;
    const steps=Math.ceil(W/step);
    for(let s=0;s<=steps;s++){
      const x=s*step;
      // 多频叠加 → 流水感
      const wy=Math.sin(x*.0088+t*1.05+ph)*4.5
               +Math.sin(x*.019 +t*.72+ph*.9)*2.2
               +Math.sin(x*.038 -t*.58+ph*.5)*.9;
      s===0?G.moveTo(x,baseY+wy):G.lineTo(x,baseY+wy);
    }
    G.stroke();
  }
  G.restore();
}

/* ════════════════════════════════════════
   节拍光晕
   ════════════════════════════════════════ */
function drawBeatGlow(){
  const b=bEnv();if(b<.02)return;
  const r=Math.min(W,H)*.26*b;
  const g=G.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,`rgba(10,8,5,${b*.020})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  G.fillStyle=g;G.fillRect(0,0,W,H);
}

/* ════════════════════════════════════════
   生成控制（减少数量）
   ════════════════════════════════════════ */
let spawnT=0;
const MAX_ELEMS=32;
const SPAWN_INT=58; // 每58帧生成一个（之前44）

function spawnCtrl(){
  spawnT++;
  if(spawnT>=SPAWN_INT&&elems.length<MAX_ELEMS){
    elems.push(new Elem(false));spawnT=0;
  }
  // 节拍额外生成（节制）
  if(F%Math.round(BF)<2&&elems.length<MAX_ELEMS+3){
    elems.push(new Elem(false));
  }
}

/* ════════════════════════════════════════
   主循环
   ════════════════════════════════════════ */
G.fillStyle='#fefefe';G.fillRect(0,0,W,H);
function loop(){
  requestAnimationFrame(loop);F++;
  G.fillStyle='rgba(254,254,254,.92)';
  G.fillRect(0,0,W,H);

  drawFlowingStaff();
  drawBeatGlow();

  for(let i=elems.length-1;i>=0;i--){
    const ok=elems[i].live();
    elems[i].draw();
    if(!ok)elems.splice(i,1);
  }
  spawnCtrl();
}
loop();
</script>
</body>
</html>
