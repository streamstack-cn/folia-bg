<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folia BG — Sonic White</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const PI  = Math.PI;
const PI2 = Math.PI * 2;
const rand = (a, b) => Math.random() * (b - a) + a;

let t = 0; // 全局时间（帧）

// ───────────────────────────────────────────
// 模拟音频波形函数（多谐波叠加）
// ───────────────────────────────────────────
function wave(x, T) {
  const t = T * 0.012;
  return (
    Math.sin(x * 2.1 + t * 1.3)   * 0.38 +
    Math.sin(x * 4.7 + t * 2.1)   * 0.22 +
    Math.sin(x * 0.9 + t * 0.7)   * 0.28 +
    Math.sin(x * 8.3 + t * 3.4)   * 0.08 +
    Math.sin(x * 1.5 - t * 0.9)   * 0.14
  );
}

// 模拟节拍包络（72BPM）
function beatEnv(T) {
  const bps = 72 / 60;
  const phase = (T * 0.016 * bps) % 1; // 0~1 per beat
  return Math.pow(Math.max(0, 1 - phase * 3), 2); // 快攻慢衰
}

// ───────────────────────────────────────────
// 1. 核心水平波形（多层叠加）
// ───────────────────────────────────────────
function drawWaveform() {
  const segments = 3;
  const configs = [
    { yOff: 0,    amp: H * 0.10, alpha: 0.55, lw: 1.2, speed: 1.0 },
    { yOff: 0,    amp: H * 0.06, alpha: 0.25, lw: 0.7, speed: 1.7 },
    { yOff: 0,    amp: H * 0.14, alpha: 0.12, lw: 2.5, speed: 0.5 },
  ];

  const beat = beatEnv(t);
  const ampBoost = 1 + beat * 0.35;

  for (const cfg of configs) {
    ctx.beginPath();
    const steps = W;
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * W;
      const nx = (i / steps) * PI2 * 2;
      const y = cy + wave(nx, t * cfg.speed) * cfg.amp * ampBoost + cfg.yOff;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(10,8,6,${cfg.alpha + beat * 0.1})`;
    ctx.lineWidth = cfg.lw;
    ctx.stroke();
  }
}

// ───────────────────────────────────────────
// 2. 圆形频谱环（音乐核心感）
// ───────────────────────────────────────────
const RING_BARS = 180;
const BASE_R = 0; // 动态计算

function drawCircularSpectrum() {
  const beat = beatEnv(t);
  const baseR = Math.min(W, H) * 0.16 + beat * Math.min(W, H) * 0.03;

  for (let i = 0; i < RING_BARS; i++) {
    const angle = (i / RING_BARS) * PI2 - PI / 2;
    const nx = (i / RING_BARS) * PI2;
    const barH = (Math.abs(wave(nx, t)) * 0.5 + 0.05) * Math.min(W, H) * 0.10 * (1 + beat * 0.5);
    const x1 = cx + Math.cos(angle) * baseR;
    const y1 = cy + Math.sin(angle) * baseR;
    const x2 = cx + Math.cos(angle) * (baseR + barH);
    const y2 = cy + Math.sin(angle) * (baseR + barH);

    const alpha = 0.18 + Math.abs(wave(nx, t)) * 0.35 + beat * 0.15;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(12,10,8,${alpha})`;
    ctx.lineWidth = (PI2 * baseR / RING_BARS) * 0.48;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // 内圆（呼吸）
  ctx.beginPath();
  ctx.arc(cx, cy, baseR - 2, 0, PI2);
  ctx.strokeStyle = `rgba(12,10,8,${0.06 + beat * 0.08})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

// ───────────────────────────────────────────
// 3. 节拍扩散环（Beat Rings）
// ───────────────────────────────────────────
const beatRings = [];
let lastBeatT = 0;

function spawnBeatRing() {
  const baseR = Math.min(W, H) * 0.16;
  beatRings.push({
    r: baseR,
    maxR: Math.min(W, H) * 0.65,
    alpha: 0.25,
    lw: 1.0,
  });
}

function updateBeatRings() {
  // 72BPM → 每 ~50帧 一拍（60fps）
  if (t - lastBeatT > 50) {
    spawnBeatRing();
    lastBeatT = t;
  }
  for (let i = beatRings.length - 1; i >= 0; i--) {
    const r = beatRings[i];
    r.r += (r.maxR - r.r) * 0.022;
    r.alpha *= 0.975;
    if (r.alpha < 0.003) { beatRings.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(cx, cy, r.r, 0, PI2);
    ctx.strokeStyle = `rgba(15,12,8,${r.alpha})`;
    ctx.lineWidth = r.lw;
    ctx.stroke();
  }
}

// ───────────────────────────────────────────
// 4. 底部频谱条（Spectrogram Bar）
// ───────────────────────────────────────────
const BAR_COUNT = 96;
const BAR_ZONE_H = 0.18; // 占屏高比例

function drawSpectrumBars() {
  const beat = beatEnv(t);
  const zoneH = H * BAR_ZONE_H;
  const totalW = W * 0.7;
  const startX = W * 0.15;
  const barW = totalW / BAR_COUNT;
  const gap   = barW * 0.25;
  const baseY = H * 0.91;

  for (let i = 0; i < BAR_COUNT; i++) {
    const nx = (i / BAR_COUNT) * PI2 * 3;
    const raw = Math.abs(wave(nx, t * 1.2)) * 0.7 +
                Math.abs(wave(nx * 0.5, t * 0.8)) * 0.3;
    const barH = (raw * 0.85 + 0.05) * zoneH * (1 + beat * 0.4);
    const x = startX + i * barW + gap / 2;
    const a = 0.10 + raw * 0.28 + beat * 0.08;

    ctx.fillStyle = `rgba(10,8,6,${a})`;
    ctx.beginPath();
    ctx.roundRect(x, baseY - barH, barW - gap, barH, 1.5);
    ctx.fill();
  }

  // 基准线
  ctx.beginPath();
  ctx.moveTo(startX, baseY + 0.5);
  ctx.lineTo(startX + totalW, baseY + 0.5);
  ctx.strokeStyle = 'rgba(10,8,6,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ───────────────────────────────────────────
// 5. 浮动音符粒子（沿波形漂移）
// ───────────────────────────────────────────
const NOTE_COUNT = 55;
const notes = [];

class Note {
  constructor(initial = false) {
    this.reset(initial);
  }
  reset(initial = false) {
    this.x  = rand(0, W);
    this.progress = initial ? rand(0, 1) : 0; // 0~1
    this.speed = rand(0.0006, 0.0016);
    this.size  = rand(1.2, 3.8);
    this.alpha = rand(0.06, 0.20);
    this.dy    = 0;
  }
  update() {
    this.progress += this.speed;
    this.x += rand(-0.3, 0.3);
    if (this.progress > 1) this.reset();
  }
  draw() {
    const nx = (this.x / W) * PI2 * 2;
    const waveY = wave(nx, t) * H * 0.10 * (1 + beatEnv(t) * 0.2);
    const floatY = cy + waveY - this.progress * H * 0.3; // 沿波向上飘
    const fade = Math.sin(this.progress * PI);

    ctx.beginPath();
    ctx.arc(this.x, floatY, this.size * 0.5, 0, PI2);
    ctx.fillStyle = `rgba(10,8,6,${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < NOTE_COUNT; i++) notes.push(new Note(true));

// ───────────────────────────────────────────
// 6. 十字准星（极简设计感）
// ───────────────────────────────────────────
function drawCrosshair() {
  const beat = beatEnv(t);
  const size = 12 + beat * 4;
  const a = 0.12 + beat * 0.08;

  ctx.save();
  ctx.strokeStyle = `rgba(10,8,6,${a})`;
  ctx.lineWidth = 0.7;

  // 横线
  ctx.beginPath();
  ctx.moveTo(cx - size, cy);
  ctx.lineTo(cx + size, cy);
  ctx.stroke();

  // 竖线
  ctx.beginPath();
  ctx.moveTo(cx, cy - size);
  ctx.lineTo(cx, cy + size);
  ctx.stroke();

  // 中心点
  ctx.beginPath();
  ctx.arc(cx, cy, 1.5 + beat * 1, 0, PI2);
  ctx.fillStyle = `rgba(10,8,6,${0.25 + beat * 0.2})`;
  ctx.fill();

  ctx.restore();
}

// ───────────────────────────────────────────
// 7. 顶部音频时间线刻度（设计感装饰）
// ───────────────────────────────────────────
function drawTimeline() {
  const y = H * 0.07;
  const startX = W * 0.12;
  const endX   = W * 0.88;
  const ticks  = 32;

  // 主线
  ctx.beginPath();
  ctx.moveTo(startX, y);
  ctx.lineTo(endX, y);
  ctx.strokeStyle = 'rgba(10,8,6,0.07)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // 刻度
  for (let i = 0; i <= ticks; i++) {
    const x = startX + (i / ticks) * (endX - startX);
    const isMajor = i % 8 === 0;
    const isMid   = i % 4 === 0;
    const h = isMajor ? 8 : isMid ? 5 : 3;
    const a = isMajor ? 0.14 : isMid ? 0.09 : 0.05;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y + h);
    ctx.strokeStyle = `rgba(10,8,6,${a})`;
    ctx.lineWidth = isMajor ? 0.8 : 0.5;
    ctx.stroke();
  }

  // 播放头（随时间移动）
  const headX = startX + ((t * 0.0008) % 1) * (endX - startX);
  ctx.beginPath();
  ctx.moveTo(headX, y - 4);
  ctx.lineTo(headX, y + 10);
  ctx.strokeStyle = 'rgba(10,8,6,0.30)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ───────────────────────────────────────────
// 主循环
// ───────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  t++;

  // 纯白背景（极低透明，几乎不留拖影）
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fillRect(0, 0, W, H);

  drawTimeline();
  updateBeatRings();
  drawWaveform();
  drawCircularSpectrum();
  drawCrosshair();
  drawSpectrumBars();
  for (const n of notes) { n.update(); n.draw(); }
}

// 首帧纯白填充
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, W, H);
loop();
</script>
</body>
</html>
