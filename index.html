<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folia Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f3ef; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const PI2 = Math.PI * 2;
const rand = (a, b) => Math.random() * (b - a) + a;
const lerp = (a, b, t) => a + (b - a) * t;

// ── 1. 透视粒子流
const PARTICLE_COUNT = 220;
const particles = [];
class Particle {
  constructor() { this.reset(true); }
  reset(initial = false) {
    this.x3 = rand(-1, 1);
    this.y3 = rand(-0.6, 0.6);
    this.z  = initial ? rand(0.1, 3) : 3;
    this.speed = rand(0.004, 0.014);
    this.size  = rand(1.2, 3.5);
    this.alpha = rand(0.25, 0.7);
    this.trail = [];
  }
  project(x3, y3, z) {
    const fov = 1.2, scale = fov / z;
    return { x: cx + x3 * cx * scale, y: cy + y3 * cy * scale, s: scale };
  }
  update() {
    this.trail.push({ z: this.z });
    if (this.trail.length > 10) this.trail.shift();
    this.z -= this.speed;
    if (this.z <= 0.05) this.reset();
  }
  draw() {
    const cur = this.project(this.x3, this.y3, this.z);
    const a = Math.min(1, (3 - this.z) / 2.5) * this.alpha;
    for (let i = 0; i < this.trail.length - 1; i++) {
      const p0 = this.project(this.x3, this.y3, this.trail[i].z);
      const p1 = this.project(this.x3, this.y3, this.trail[i + 1].z);
      const ta = (i / this.trail.length) * a * 0.4;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(20,18,15,${ta})`;
      ctx.lineWidth = this.size * p0.s * 0.3;
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(cur.x, cur.y, this.size * Math.min(cur.s, 2) * 0.6, 0, PI2);
    ctx.fillStyle = `rgba(20,18,15,${a})`;
    ctx.fill();
  }
}
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// ── 2. 流动墨线
const INK_COUNT = 6;
const inks = [];
class InkLine {
  constructor() { this.reset(); }
  reset() {
    this.life = rand(300, 600); this.age = rand(0, 200);
    this.p0 = { x: rand(0, W), y: rand(0, H) };
    this.p1 = { x: rand(0, W), y: rand(0, H) };
    this.p2 = { x: rand(0, W), y: rand(0, H) };
    this.p3 = { x: rand(0, W), y: rand(0, H) };
    this.tp1 = { x: rand(0, W), y: rand(0, H) };
    this.tp2 = { x: rand(0, W), y: rand(0, H) };
    this.width = rand(0.5, 1.8); this.alpha = rand(0.04, 0.14);
  }
  update() {
    this.age++;
    this.p1.x = lerp(this.p1.x, this.tp1.x, 0.003);
    this.p1.y = lerp(this.p1.y, this.tp1.y, 0.003);
    this.p2.x = lerp(this.p2.x, this.tp2.x, 0.003);
    this.p2.y = lerp(this.p2.y, this.tp2.y, 0.003);
    if (Math.random() < 0.005) {
      this.tp1 = { x: rand(0, W), y: rand(0, H) };
      this.tp2 = { x: rand(0, W), y: rand(0, H) };
    }
    if (this.age > this.life) this.reset();
  }
  draw() {
    const prog = this.age / this.life;
    const fade = Math.sin(prog * Math.PI);
    ctx.beginPath();
    ctx.moveTo(this.p0.x, this.p0.y);
    ctx.bezierCurveTo(this.p1.x, this.p1.y, this.p2.x, this.p2.y, this.p3.x, this.p3.y);
    ctx.strokeStyle = `rgba(30,25,18,${this.alpha * fade})`;
    ctx.lineWidth = this.width;
    ctx.stroke();
  }
}
for (let i = 0; i < INK_COUNT; i++) inks.push(new InkLine());

// ── 3. 扩散圆环
const rings = [];
class Ring {
  constructor() { this.reset(); }
  reset() {
    this.x = rand(cx * 0.3, cx * 1.7); this.y = rand(cy * 0.3, cy * 1.7);
    this.r = 0; this.maxR = rand(80, 250);
    this.speed = rand(0.4, 0.9);
    this.alpha = rand(0.06, 0.15); this.width = rand(0.5, 1.5); this.dead = false;
  }
  update() { this.r += this.speed; if (this.r >= this.maxR) this.dead = true; }
  draw() {
    const a = (1 - this.r / this.maxR) * this.alpha;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, PI2);
    ctx.strokeStyle = `rgba(25,20,12,${a})`; ctx.lineWidth = this.width; ctx.stroke();
  }
}

// ── 4. 中心呼吸光
let breathT = 0;
function drawBreath() {
  breathT += 0.008;
  const pulse = (Math.sin(breathT) + 1) / 2;
  const r = 180 + pulse * 80;
  const a = 0.04 + pulse * 0.04;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0,   `rgba(200,185,160,${a})`);
  grad.addColorStop(0.5, `rgba(210,200,185,${a * 0.4})`);
  grad.addColorStop(1,   'rgba(245,243,239,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── 5. 微噪点纹理
let noiseCanvas;
function buildNoise() {
  noiseCanvas = document.createElement('canvas');
  noiseCanvas.width = 256; noiseCanvas.height = 256;
  const nc = noiseCanvas.getContext('2d');
  const img = nc.createImageData(256, 256);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 30;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = 12;
  }
  nc.putImageData(img, 0, 0);
}
buildNoise();
function drawNoise() {
  const pat = ctx.createPattern(noiseCanvas, 'repeat');
  ctx.fillStyle = pat; ctx.fillRect(0, 0, W, H);
}

// ── 6. 消失点透视射线网格
let gridT = 0;
function drawPerspectiveGrid() {
  gridT += 0.0015;
  const lines = 10, spread = Math.max(W, H) * 1.4;
  ctx.save();
  for (let i = 0; i < lines; i++) {
    const angle = (i / lines) * PI2 + gridT;
    const ex = cx + Math.cos(angle) * spread;
    const ey = cy + Math.sin(angle) * spread;
    const a = 0.025 + 0.015 * Math.abs(Math.sin(angle * 3 + gridT * 2));
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(40,35,25,${a})`; ctx.lineWidth = 0.6; ctx.stroke();
  }
  ctx.restore();
}

// ── 主循环
ctx.fillStyle = '#f5f3ef'; ctx.fillRect(0, 0, W, H);
function loop() {
  requestAnimationFrame(loop);
  ctx.fillStyle = 'rgba(245,243,239,0.35)';
  ctx.fillRect(0, 0, W, H);
  drawBreath();
  drawPerspectiveGrid();
  drawNoise();
  for (const ink of inks) { ink.update(); ink.draw(); }
  for (let i = rings.length - 1; i >= 0; i--) {
    rings[i].update(); rings[i].draw();
    if (rings[i].dead) rings.splice(i, 1);
  }
  if (Math.random() < 0.004) rings.push(new Ring());
  for (const p of particles) { p.update(); p.draw(); }
}
loop();
</script>
</body>
</html>
